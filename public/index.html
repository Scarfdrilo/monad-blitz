<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monad Blitz - Cute RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a0533 0%, #2d1b69 50%, #1a0533 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }
    #gameContainer {
      position: relative;
      border: 4px solid #7B3FE4;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(123, 63, 228, 0.5), 0 0 60px rgba(123, 63, 228, 0.2);
    }
    canvas { display: block; image-rendering: pixelated; }
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      pointer-events: none; z-index: 10;
    }
    #hud > * { pointer-events: auto; }
    .hud-text { color: #FFD700; font-size: 10px; text-shadow: 2px 2px 0 #000; }
    .hud-coins { display: flex; align-items: center; gap: 8px; }
    .hud-hearts { display: flex; gap: 4px; }
    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; padding: 6px 10px;
      border: 2px solid #7B3FE4; border-radius: 4px;
      background: rgba(123,63,228,0.3); color: #fff;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover {
      background: rgba(123,63,228,0.6);
      box-shadow: 0 0 10px rgba(123,63,228,0.5);
    }
    #claimBtn { border-color: #FFD700; background: rgba(255,215,0,0.2); color: #FFD700; display: none; }
    #claimBtn:hover { background: rgba(255,215,0,0.4); box-shadow: 0 0 10px rgba(255,215,0,0.5); }
    #walletBtn.connected { border-color: #4ade80; color: #4ade80; font-size: 6px; }
    .star {
      position: fixed; width: 2px; height: 2px;
      background: #fff; border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

    /* ===== WalletConnect Modal ===== */
    #wcOverlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    #wcOverlay.open { display: flex; }
    #wcModal {
      background: #1e1145; border: 3px solid #7B3FE4; border-radius: 16px;
      padding: 24px; width: 360px; max-width: 90vw;
      box-shadow: 0 0 40px rgba(123,63,228,0.6);
    }
    #wcModal h3 {
      color: #fff; font-size: 12px; text-align: center; margin-bottom: 20px;
    }
    .wc-option {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; margin-bottom: 10px;
      background: rgba(123,63,228,0.15); border: 2px solid rgba(123,63,228,0.3);
      border-radius: 10px; cursor: pointer; transition: all 0.2s; width: 100%;
      font-family: 'Press Start 2P', monospace; font-size: 8px; color: #fff;
    }
    .wc-option:hover { background: rgba(123,63,228,0.35); border-color: #7B3FE4; transform: scale(1.02); }
    .wc-icon {
      width: 36px; height: 36px; border-radius: 8px; display: flex;
      align-items: center; justify-content: center; font-size: 20px;
      flex-shrink: 0;
    }
    .wc-option span { flex: 1; }
    .wc-option small { color: rgba(255,255,255,0.4); font-size: 6px; }
    #wcClose {
      display: block; margin: 16px auto 0; background: none; border: none;
      color: rgba(255,255,255,0.4); font-family: 'Press Start 2P'; font-size: 8px;
      cursor: pointer;
    }
    #wcClose:hover { color: #fff; }
    #wcStatus { text-align: center; color: #a78bfa; font-size: 7px; margin-top: 12px; display: none; }
    .wc-chain {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 16px; padding: 8px; background: rgba(123,63,228,0.1);
      border-radius: 8px; font-size: 7px; color: #a78bfa;
    }
    .wc-chain-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
  </style>
</head>
<body>
  <!-- Wallet Connect Modal -->
  <div id="wcOverlay">
    <div id="wcModal">
      <h3>Connect Wallet</h3>
      <div class="wc-chain"><div class="wc-chain-dot"></div> Monad Testnet</div>
      <button class="wc-option" id="mmBtn" onclick="connectMetaMask()">
        <div class="wc-icon" style="background: linear-gradient(135deg, #E8831D, #F5841F);">🦊</div>
        <span>MetaMask<br><small>Browser Extension</small></span>
      </button>
      <button class="wc-option" onclick="connectWC()">
        <div class="wc-icon" style="background: linear-gradient(135deg, #3B99FC, #2d7dd2);">🔗</div>
        <span>WalletConnect<br><small>Scan QR / Mobile wallet</small></span>
      </button>
      <div id="wcStatus"></div>
      <button id="wcClose" onclick="closeWCModal()">CANCEL</button>
    </div>
  </div>

  <div id="gameContainer">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="hud" style="display:none;">
      <div class="hud-coins">
        <span class="hud-text" id="scoreText">0 BLTZ</span>
      </div>
      <div class="hud-hearts" id="hearts"></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn" id="claimBtn" onclick="claimOnChain()">CLAIM ON-CHAIN</button>
        <button class="btn" id="walletBtn" onclick="openWCModal()">CONNECT</button>
      </div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js"></script>
<script src="https://unpkg.com/@walletconnect/web3wallet@latest/dist/index.umd.js" onerror="console.log('WC optional')"></script>
<script>
// ==================== CONFIG ====================
const CONTRACT_ADDRESS = '0x8057355a60008AD9AdBaFEF0fB8F78573cEC3BA4';
const CONTRACT_ABI = [
  "function claimReward(uint256 amount) external",
  "function getBalance(address account) external view returns (uint256)",
  "function balanceOf(address account) external view returns (uint256)",
  "function lastClaim(address) external view returns (uint256)",
  "function CLAIM_COOLDOWN() external view returns (uint256)",
  "function MAX_CLAIM() external view returns (uint256)",
  "function name() view returns (string)",
  "function symbol() view returns (string)",
  "function totalSupply() view returns (uint256)"
];
const MONAD_CHAIN_ID = '0x279F';
const MONAD_TESTNET = {
  chainId: MONAD_CHAIN_ID,
  chainName: 'Monad Testnet',
  rpcUrls: ['https://testnet-rpc.monad.xyz'],
  nativeCurrency: { name: 'MON', symbol: 'MON', decimals: 18 },
  blockExplorerUrls: ['https://testnet.monadexplorer.com']
};
const WC_PROJECT_ID = 'c41de8a7b636fd7ad1abaf6edd44a18e';

// ==================== GAME STATE ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
const TILE = 32;

let gameState = 'title';
let score = 0;
let health = 5;
let walletAddress = null;
let walletProvider = null;
let frame = 0;
let shakeTimer = 0;
let particles = [];
let floatingTexts = [];

// Stars background
for (let i = 0; i < 50; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = Math.random() * 2 + 's';
  s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
  document.body.appendChild(s);
}

// ==================== WALLET MODAL ====================
// Detect injected providers (MetaMask can take up to 1s to inject)
function getProvider() {
  // MetaMask injects window.ethereum, but sometimes as an array of providers
  if (window.ethereum) {
    // If multiple providers (e.g. MetaMask + Coinbase), find MetaMask
    if (window.ethereum.providers?.length) {
      return window.ethereum.providers.find(p => p.isMetaMask) || window.ethereum.providers[0];
    }
    return window.ethereum;
  }
  // Check other common injected wallets
  return window.okxwallet || window.phantom?.ethereum || null;
}

function openWCModal() {
  if (walletAddress) {
    if (confirm('Disconnect wallet?')) {
      walletAddress = null;
      walletProvider = null;
      document.getElementById('walletBtn').textContent = 'CONNECT';
      document.getElementById('walletBtn').classList.remove('connected');
      updateHUD();
    }
    return;
  }
  // Update MetaMask button state
  const mmBtn = document.getElementById('mmBtn');
  const provider = getProvider();
  if (provider) {
    mmBtn.querySelector('small').textContent = provider.isMetaMask ? 'Detected' : 'Extension found';
    mmBtn.style.borderColor = '#4ade80';
  } else {
    mmBtn.querySelector('small').textContent = 'Not detected';
    mmBtn.style.borderColor = 'rgba(123,63,228,0.3)';
  }
  document.getElementById('wcOverlay').classList.add('open');
  document.getElementById('wcStatus').style.display = 'none';
}

function closeWCModal() {
  document.getElementById('wcOverlay').classList.remove('open');
}

function showWCStatus(msg, isError) {
  const el = document.getElementById('wcStatus');
  el.textContent = msg;
  el.style.color = isError ? '#ff4757' : '#a78bfa';
  el.style.display = 'block';
}

async function switchToMonad(provider) {
  try {
    await provider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: MONAD_CHAIN_ID }] });
  } catch (e) {
    if (e.code === 4902 || e.code === -32603) {
      await provider.request({ method: 'wallet_addEthereumChain', params: [MONAD_TESTNET] });
    } else {
      throw e;
    }
  }
}

function onWalletConnected(address, provider) {
  walletAddress = address;
  walletProvider = provider;
  const btn = document.getElementById('walletBtn');
  btn.textContent = address.slice(0, 6) + '...' + address.slice(-4);
  btn.classList.add('connected');
  closeWCModal();
  updateHUD();
  addFloatingText(W/2, H/2 - 40, 'WALLET CONNECTED!', '#4ade80');
  addParticles(W/2, H/2, '#4ade80', 15);
}

async function connectMetaMask() {
  let provider = getProvider();
  if (!provider) {
    // MetaMask might not have injected yet, wait and retry
    showWCStatus('Looking for MetaMask...');
    await new Promise(r => setTimeout(r, 1500));
    provider = getProvider();
  }
  if (!provider) {
    showWCStatus('No wallet extension found! Install MetaMask from metamask.io', true);
    return;
  }
  showWCStatus('Waiting for wallet approval...');
  try {
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    showWCStatus('Switching to Monad Testnet...');
    await switchToMonad(provider);
    onWalletConnected(accounts[0], provider);
  } catch (e) {
    console.error('MetaMask error:', e);
    if (e.code === 4001) {
      showWCStatus('Connection rejected by user', true);
    } else {
      showWCStatus('Error: ' + (e.message || '').slice(0, 60), true);
    }
  }
}

async function connectWC() {
  showWCStatus('Loading WalletConnect...');
  try {
    // Use WalletConnect EthereumProvider which has its own built-in modal
    const module = await import('https://esm.sh/@walletconnect/ethereum-provider@2.17.3');
    const EthereumProvider = module.default || module.EthereumProvider;

    showWCStatus('Opening WalletConnect...');
    const wcProvider = await EthereumProvider.init({
      projectId: WC_PROJECT_ID,
      chains: [10143],
      showQrModal: true,
      metadata: {
        name: 'Monad Blitz',
        description: 'Cute 2D RPG on Monad Testnet',
        url: window.location.origin,
        icons: []
      },
      qrModalOptions: {
        themeMode: 'dark',
        themeVariables: {
          '--wcm-accent-color': '#7B3FE4',
          '--wcm-background-color': '#1e1145'
        }
      }
    });

    // This opens the WalletConnect QR modal
    await wcProvider.connect();
    const accounts = wcProvider.accounts;
    if (accounts && accounts.length > 0) {
      onWalletConnected(accounts[0], wcProvider);
    } else {
      showWCStatus('No accounts found', true);
    }

    // Listen for disconnect
    wcProvider.on('disconnect', () => {
      walletAddress = null;
      walletProvider = null;
      document.getElementById('walletBtn').textContent = 'CONNECT';
      document.getElementById('walletBtn').classList.remove('connected');
      updateHUD();
    });
  } catch (e) {
    console.error('WC error:', e);
    if (e.message?.includes('User rejected') || e.message?.includes('dismissed')) {
      showWCStatus('Connection cancelled', true);
    } else {
      showWCStatus('WalletConnect failed. Try MetaMask.', true);
    }
  }
}

// Close modal on overlay click
document.getElementById('wcOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeWCModal();
});

// ==================== MAP ====================
const MAP_W = 25, MAP_H = 19;
const map = [];
function generateMap() {
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      const r = Math.random();
      if (x === 0 || x === MAP_W-1 || y === 0 || y === MAP_H-1) {
        map[y][x] = Math.random() < 0.5 ? 3 : 5;
      } else if (y === 9 || x === 12) {
        map[y][x] = 1;
      } else if (r < 0.05) map[y][x] = 3;
      else if (r < 0.08) map[y][x] = 5;
      else if (r < 0.15) map[y][x] = 2;
      else map[y][x] = 0;
    }
  }
}
generateMap();

function isSolid(x, y) {
  const tx = Math.floor(x / TILE), ty = Math.floor(y / TILE);
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return true;
  return map[ty][tx] === 3 || map[ty][tx] === 5;
}

// ==================== PLAYER ====================
const player = {
  x: 400, y: 300, w: 24, h: 28, speed: 2.5,
  dir: 0, walking: false, animFrame: 0, invincible: 0
};

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (gameState === 'title' && (e.key === 'Enter' || e.key === ' ')) startGame();
  if (gameState === 'gameover' && (e.key === 'Enter' || e.key === ' ')) startGame();
});
document.addEventListener('keyup', e => keys[e.key] = false);

// ==================== COINS ====================
let coins = [];
function spawnCoin() {
  let x, y, attempts = 0;
  do {
    x = (Math.floor(Math.random() * (MAP_W - 4)) + 2) * TILE + TILE/2;
    y = (Math.floor(Math.random() * (MAP_H - 4)) + 2) * TILE + TILE/2;
    attempts++;
  } while (isSolid(x, y) && attempts < 50);
  coins.push({ x, y, anim: Math.random() * Math.PI * 2, collected: false });
}

// ==================== ENEMIES (SLIMES) ====================
let slimes = [];
function spawnSlime() {
  let x, y, attempts = 0;
  do {
    x = (Math.floor(Math.random() * (MAP_W - 6)) + 3) * TILE;
    y = (Math.floor(Math.random() * (MAP_H - 6)) + 3) * TILE;
    attempts++;
  } while (isSolid(x, y) && attempts < 50);
  slimes.push({
    x, y, w: 24, h: 20,
    vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
    bounce: Math.random() * Math.PI * 2,
    color: ['#a855f7','#6366f1','#ec4899','#14b8a6','#f59e0b'][Math.floor(Math.random()*5)]
  });
}

// ==================== PARTICLES ====================
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 40, vy: -1.5 });
}

// ==================== DRAWING ====================
function drawTile(x, y, type) {
  const px = x * TILE, py = y * TILE;
  ctx.fillStyle = '#4a7c59';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = '#5a9c69';
  if ((x + y) % 2 === 0) {
    ctx.fillRect(px + 4, py + 4, 2, 6);
    ctx.fillRect(px + 20, py + 18, 2, 6);
  }
  if (type === 1) {
    ctx.fillStyle = '#c4a96a';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#b89a5a';
    ctx.fillRect(px + 8, py + 8, 4, 4);
    ctx.fillRect(px + 20, py + 20, 4, 4);
  } else if (type === 2) {
    const colors = ['#ff6b9d','#ffd700','#ff4757','#ff9ff3'];
    const c = colors[(x * 7 + y * 13) % colors.length];
    ctx.fillStyle = '#3a6b49';
    ctx.fillRect(px + 14, py + 18, 4, 10);
    ctx.fillStyle = c;
    ctx.fillRect(px + 12, py + 12, 8, 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 15, py + 15, 2, 2);
  } else if (type === 3) {
    ctx.fillStyle = '#6b4423';
    ctx.fillRect(px + 12, py + 16, 8, 16);
    ctx.fillStyle = '#2d8a4e';
    ctx.fillRect(px + 4, py + 4, 24, 16);
    ctx.fillStyle = '#3aad5e';
    ctx.fillRect(px + 8, py, 16, 12);
  } else if (type === 5) {
    ctx.fillStyle = '#2d7a3e';
    ctx.fillRect(px + 4, py + 8, 24, 20);
    ctx.fillStyle = '#3a9a4e';
    ctx.fillRect(px + 8, py + 4, 16, 16);
  }
}

function drawPlayer() {
  const { x, y, dir, walking, invincible } = player;
  if (invincible > 0 && Math.floor(frame / 4) % 2 === 0) return;
  const bob = walking ? Math.sin(frame * 0.3) * 2 : 0;
  const px = Math.floor(x - 12), py = Math.floor(y - 14 + bob);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 4, py + 26, 16, 4);
  ctx.fillStyle = '#7B3FE4';
  ctx.fillRect(px + 6, py + 12, 12, 12);
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(px + 7, py + 6, 10, 10);
  ctx.fillStyle = '#222';
  if (dir === 2) { ctx.fillRect(px + 8, py + 9, 2, 3); }
  else if (dir === 3) { ctx.fillRect(px + 14, py + 9, 2, 3); }
  else { ctx.fillRect(px + 9, py + 9, 2, 3); ctx.fillRect(px + 13, py + 9, 2, 3); }
  ctx.fillStyle = 'rgba(255,100,100,0.4)';
  ctx.fillRect(px + 7, py + 11, 3, 2);
  ctx.fillRect(px + 14, py + 11, 3, 2);
  ctx.fillStyle = '#7B3FE4';
  ctx.fillRect(px + 5, py + 4, 14, 4);
  ctx.fillRect(px + 8, py, 8, 6);
  ctx.fillRect(px + 10, py - 3, 4, 4);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(px + 11, py - 1, 2, 2);
  ctx.fillStyle = '#5a2db3';
  const legOffset = walking ? Math.sin(frame * 0.3) * 3 : 0;
  ctx.fillRect(px + 7, py + 24, 4, 4 + (walking ? legOffset : 0));
  ctx.fillRect(px + 13, py + 24, 4, 4 - (walking ? legOffset : 0));
  ctx.fillStyle = '#cc6644';
  ctx.fillRect(px + 11, py + 13, 3, 1);
}

function drawCoin(coin) {
  const { x, y, anim } = coin;
  const scale = Math.abs(Math.cos(anim));
  const glow = Math.sin(anim) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(255,215,0,${glow * 0.2})`;
  ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(x - 6 * scale, y - 6, 12 * scale, 12);
  ctx.fillStyle = '#FFA500';
  ctx.fillRect(x - 4 * scale, y - 4, 8 * scale, 8);
  if (scale > 0.3) { ctx.fillStyle = '#cc8800'; ctx.fillRect(x - 2 * scale, y - 3, 4 * scale, 6); }
  if (Math.sin(anim * 2) > 0.8) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 8, y - 2, 2, 2);
    ctx.fillRect(x + 6, y + 4, 2, 2);
  }
}

function drawSlime(slime) {
  const { x, y, bounce, color } = slime;
  const squish = Math.sin(bounce) * 3;
  const px = Math.floor(x), py = Math.floor(y);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 2, py + 18 + squish, 20, 4);
  ctx.fillStyle = color;
  ctx.fillRect(px + 2, py + 4 - squish, 20, 16 + squish);
  ctx.fillRect(px + 4, py + 2 - squish, 16, 20 + squish);
  ctx.fillRect(px + 6, py - squish, 12, 22 + squish);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(px + 6, py + 4 - squish, 4, 6);
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + 7, py + 8 - squish, 4, 5);
  ctx.fillRect(px + 14, py + 8 - squish, 4, 5);
  ctx.fillStyle = '#222';
  ctx.fillRect(px + 8, py + 10 - squish, 2, 3);
  ctx.fillRect(px + 15, py + 10 - squish, 2, 3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + 10, py + 14 - squish, 4, 2);
}

function drawHeart(x, y, filled) {
  ctx.fillStyle = filled ? '#ff4757' : '#333';
  ctx.fillRect(x + 2, y, 4, 2); ctx.fillRect(x + 8, y, 4, 2);
  ctx.fillRect(x, y + 2, 14, 2); ctx.fillRect(x, y + 4, 14, 2);
  ctx.fillRect(x + 2, y + 6, 10, 2); ctx.fillRect(x + 4, y + 8, 6, 2);
  ctx.fillRect(x + 6, y + 10, 2, 2);
  if (filled) { ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(x + 3, y + 2, 2, 2); }
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  const cx = ((frame * 0.3) % (W + 200)) - 100;
  ctx.fillRect(cx, 30, 60, 16); ctx.fillRect(cx + 10, 22, 40, 8);
  ctx.fillRect(cx + 300, 60, 80, 16); ctx.fillRect(cx + 320, 50, 40, 12);
}

// ==================== TITLE SCREEN ====================
function drawTitle() {
  ctx.fillStyle = '#1a0533';
  ctx.fillRect(0, 0, W, H);
  drawClouds();
  for (let x = 0; x < MAP_W; x++) {
    for (let y = 14; y < MAP_H; y++) { drawTile(x, y, y === 14 ? 2 : 0); }
  }
  ctx.fillStyle = '#FFD700';
  ctx.font = '32px "Press Start 2P"'; ctx.textAlign = 'center';
  ctx.fillText('MONAD', W/2, 160);
  ctx.fillStyle = '#7B3FE4';
  ctx.fillText('BLITZ', W/2, 200);
  const bob = Math.sin(frame * 0.05) * 3;
  ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
  ctx.fillText('Help Blitzy collect magical', W/2, 260 + bob);
  ctx.fillText('coins in the Monad realm!', W/2, 280 + bob);
  for (let i = 0; i < 5; i++) {
    drawCoin({ x: 200 + i * 100, y: 340 + Math.sin(frame * 0.06 + i) * 15, anim: frame * 0.08 + i });
  }
  drawSlime({ x: 180, y: 380 + Math.sin(frame * 0.04) * 5, bounce: frame * 0.1, color: '#a855f7' });
  drawSlime({ x: 580, y: 385 + Math.sin(frame * 0.04 + 1) * 5, bounce: frame * 0.1 + 1, color: '#ec4899' });
  if (Math.sin(frame * 0.08) > 0) {
    ctx.fillStyle = '#FFD700'; ctx.font = '14px "Press Start 2P"';
    ctx.fillText('PRESS ENTER TO START', W/2, 480);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '8px "Press Start 2P"';
  ctx.fillText('Built on Monad Testnet', W/2, 560);
  ctx.fillText('Contract: ' + CONTRACT_ADDRESS.slice(0,10) + '...', W/2, 578);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff4757'; ctx.font = '28px "Press Start 2P"'; ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, 220);
  ctx.fillStyle = '#FFD700'; ctx.font = '16px "Press Start 2P"';
  ctx.fillText('Score: ' + score + ' BLTZ', W/2, 280);
  if (walletAddress && score > 0) {
    ctx.fillStyle = '#4ade80'; ctx.font = '10px "Press Start 2P"';
    ctx.fillText('Click CLAIM to save your coins!', W/2, 330);
  }
  if (Math.sin(frame * 0.08) > 0) {
    ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"';
    ctx.fillText('PRESS ENTER TO RETRY', W/2, 400);
  }
}

// ==================== GAME LOGIC ====================
function startGame() {
  gameState = 'playing';
  score = 0; health = 5;
  player.x = 400; player.y = 300; player.invincible = 0;
  coins = []; slimes = []; particles = []; floatingTexts = [];
  generateMap();
  for (let i = 0; i < 15; i++) spawnCoin();
  for (let i = 0; i < 5; i++) spawnSlime();
  document.getElementById('hud').style.display = 'flex';
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreText').textContent = score + ' BLTZ';
  document.getElementById('claimBtn').style.display = score >= 10 && walletAddress ? 'block' : 'none';
}

function update() {
  if (gameState !== 'playing') return;
  let dx = 0, dy = 0;
  player.walking = false;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { dx = -player.speed; player.dir = 2; player.walking = true; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = player.speed; player.dir = 3; player.walking = true; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { dy = -player.speed; player.dir = 1; player.walking = true; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { dy = player.speed; player.dir = 0; player.walking = true; }
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  const nx = player.x + dx, ny = player.y + dy;
  if (!isSolid(nx - 10, ny - 10) && !isSolid(nx + 10, ny - 10) &&
      !isSolid(nx - 10, ny + 12) && !isSolid(nx + 10, ny + 12)) {
    player.x = nx; player.y = ny;
  }
  if (player.invincible > 0) player.invincible--;
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i]; c.anim += 0.08;
    if (Math.hypot(player.x - c.x, player.y - c.y) < 18) {
      coins.splice(i, 1); score++;
      addParticles(c.x, c.y, '#FFD700', 12);
      addFloatingText(c.x, c.y - 10, '+1', '#FFD700');
      spawnCoin(); updateHUD();
    }
  }
  for (const s of slimes) {
    s.bounce += 0.12; s.x += s.vx; s.y += s.vy;
    if (isSolid(s.x, s.y) || isSolid(s.x + 20, s.y + 20) || s.x < TILE || s.x > (MAP_W-2)*TILE || s.y < TILE || s.y > (MAP_H-2)*TILE) {
      s.vx = (Math.random() - 0.5) * 2.5; s.vy = (Math.random() - 0.5) * 2.5;
    }
    if (Math.random() < 0.01) { s.vx = (Math.random() - 0.5) * 2.5; s.vy = (Math.random() - 0.5) * 2.5; }
    if (player.invincible <= 0 && Math.hypot(player.x - (s.x + 12), player.y - (s.y + 10)) < 20) {
      health--; player.invincible = 60; shakeTimer = 10;
      if (score > 0) score--;
      addParticles(player.x, player.y, '#ff4757', 8);
      addFloatingText(player.x, player.y - 20, '-1', '#ff4757');
      updateHUD();
      if (health <= 0) { gameState = 'gameover'; }
    }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const t = floatingTexts[i]; t.y += t.vy; t.life--;
    if (t.life <= 0) floatingTexts.splice(i, 1);
  }
}

function draw() {
  let sx = 0, sy = 0;
  if (shakeTimer > 0) { sx = (Math.random() - 0.5) * 6; sy = (Math.random() - 0.5) * 6; shakeTimer--; }
  ctx.save(); ctx.translate(sx, sy);
  if (gameState === 'title') { drawTitle(); ctx.restore(); return; }
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) drawTile(x, y, map[y][x]);
  drawClouds();
  for (const c of coins) drawCoin(c);
  for (const s of slimes) drawSlime(s);
  drawPlayer();
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife; ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  for (const t of floatingTexts) {
    ctx.globalAlpha = t.life / 40; ctx.fillStyle = t.color;
    ctx.font = '10px "Press Start 2P"'; ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;
  for (let i = 0; i < 5; i++) drawHeart(340 + i * 18, 8, i < health);
  ctx.restore();
  if (gameState === 'gameover') drawGameOver();
}

function gameLoop() { frame++; update(); draw(); requestAnimationFrame(gameLoop); }

// ==================== CLAIM ON-CHAIN ====================
async function claimOnChain() {
  if (!walletAddress || !CONTRACT_ADDRESS) return;
  const btn = document.getElementById('claimBtn');
  try {
    const provider = new ethers.BrowserProvider(walletProvider || window.ethereum);
    const signer = await provider.getSigner();
    const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

    // Check cooldown
    try {
      const lastClaim = await contract.lastClaim(walletAddress);
      const cooldown = await contract.CLAIM_COOLDOWN();
      const now = BigInt(Math.floor(Date.now() / 1000));
      if (lastClaim > 0n && now < lastClaim + cooldown) {
        const wait = Number(lastClaim + cooldown - now);
        btn.textContent = 'WAIT ' + wait + 's';
        setTimeout(() => { btn.textContent = 'CLAIM ON-CHAIN'; }, 2000);
        return;
      }
    } catch(e) { /* proceed anyway */ }

    const amount = ethers.parseEther(score.toString());
    btn.textContent = 'CLAIMING...';
    const tx = await contract.claimReward(amount);
    btn.textContent = 'CONFIRMING...';
    await tx.wait();
    btn.textContent = 'CLAIMED!';
    addFloatingText(W/2, H/2, score + ' BLTZ CLAIMED!', '#4ade80');
    addParticles(W/2, H/2, '#7B3FE4', 20);
    addParticles(W/2, H/2, '#FFD700', 15);
    setTimeout(() => { btn.textContent = 'CLAIM ON-CHAIN'; }, 3000);
  } catch (e) {
    console.error('Claim failed:', e);
    const msg = e.reason || e.message || '';
    if (msg.includes('Cooldown')) btn.textContent = 'COOLDOWN!';
    else btn.textContent = 'FAILED';
    setTimeout(() => { btn.textContent = 'CLAIM ON-CHAIN'; }, 2000);
  }
}

// ==================== CANVAS CLICK ====================
canvas.addEventListener('click', () => {
  if (gameState === 'title') startGame();
  if (gameState === 'gameover') startGame();
});

// ==================== START ====================
gameLoop();
</script>
